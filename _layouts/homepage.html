<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <title>{{ site.title }}</title>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" media="(prefers-color-scheme:dark)" href="{{ site.favicon_dark }}" type="image/png" />
    <link rel="icon" media="(prefers-color-scheme:light)" href="{{ site.favicon }}" type="image/png" />
    <script src="./assets/js/favicon-switcher.js" type="application/javascript"></script>

    <link rel=stylesheet href=https://cdnjs.cloudflare.com/ajax/libs/academicons/1.8.6/css/academicons.min.css integrity="sha256-uFVgMKfistnJAfoCUQigIl+JfUaP47GrRKjf6CTPVmw=" crossorigin=anonymous>
    <link rel=stylesheet href=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.min.css integrity="sha256-+N4/V/SbAFiW1MPBCXnfnP9QSN3+Keu+NlB+0ev/YKQ=" crossorigin=anonymous>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">

    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">

  </head>
  <body>
    <div class="wrapper">
      <header>
        
        {% if site.avatar %}
        <a class="image avatar"><img src="{{site.avatar}}" alt="avatar" onContextMenu="return false" /></a>
        {% endif %}

        <h1>{{ site.title }}</h1> 

        <!-- 
        {% if site.position %}
        {{ site.position }}
        <br>
        {% endif %}
        {{ site.affiliation }}
        {% if site.email %}
        <br>
        {{ site.email }}
        <br>
        <br>
        {% endif %}
         -->
        <!-- <a href="https://www.facebook.com/ishantarunesh" target="_blank"><i class="fab fa-facebook" aria-hidden="true" style="font-size: 1.5em;"></i></a> -->
        <!-- &nbsp;&nbsp; -->
        <a href="http://github.com/ishan00" class="icons" target="_blank"><i class="fab fa-github" aria-hidden="true" style="font-size: 1.5em;"></i></a>
        &nbsp;&nbsp;
        <a href="https://in.linkedin.com/in/ishan-tarunesh" class="icons" target="_blank"><i class="fab fa-linkedin" aria-hidden="true" style="font-size: 1.5em;"></i></a>
        &nbsp;&nbsp;
        <a href="https://scholar.google.com/citations?user=MP3lwPoAAAAJ" class="icons" target="_blank"><i class="ai ai-google-scholar" aria-hidden="true" style="font-size: 1.5em;"></i></a>
        &nbsp;&nbsp;
        <a href="http://goodreads.com/ishantarunesh" class="icons" target="_blank"><i class="fab fa-goodreads" aria-hidden="true" style="font-size: 1.5em;"></i></a>
        
      </header>
      <section>

      {{ content }}

      <br>

      <p><small>Powered by Jekyll and <a href="https://github.com/yaoyao-liu/minimal-light" target="_blank" rel="noopener">Minimal Light</a> theme.</small></p>

      </section>

      <footer>
        <h3><a href="writings"><u>Writings.</u></a></h3>
      </footer>

    </div>
    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>

  </body>
</html>
